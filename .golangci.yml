# golangci-lint v2 configuration for go-ztts
# Run with: golangci-lint run ./...

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: false

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - unconvert
  disable:
    - exhaustive
    - unparam
    - gocritic
    - gosec
    - unused

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  govet:
    enable-all: true
    disable:
      - fieldalignment
  goimports:
    local-prefixes: github.com/sirosfoundation/go-ztts

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - linters:
        - staticcheck
      text: "QF1008"

output:
  formats:
    colored-line-number: {}
  print-linter-name: true
  sort-results: true
